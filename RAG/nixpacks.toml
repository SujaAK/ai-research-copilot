[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = [
  "python3 -m pip install --upgrade pip",
  "python3 -m pip install torch==2.6.0+cpu --extra-index-url https://download.pytorch.org/whl/cpu",
  "python3 -m pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"